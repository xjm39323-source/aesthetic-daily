name: Daily Aesthetic Build
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: cd scraper && pip install -r requirements.txt
      - name: Run scraper
        env:
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: cd scraper && python build.py
      - name: Commit and push data.json
        run: |
          git config --global user.name 'aesthetic-bot'
          git config --global user.email 'bot@aesthetic-daily'
          ls -la js/data.json 2>/dev/null && cp js/data.json data.json 2>/dev/null || true
          ls -la js/data.json 2>/dev/null && cp js/data.json data.json 2>/dev/null || true
          git add data.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m 'auto: update daily theme'
          git push