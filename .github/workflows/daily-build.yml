name: Daily Aesthetic Build
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: cd scraper && pip install -r requirements.txt
      - name: Run scraper
        run: cd scraper && python build.py
      - name: Commit and push data.json
        run: |
          cp js/data.json data.json 2>/dev/null || true
          if [ -f data.json ]; then
            git config user.name 'aesthetic-bot'
            git config user.email 'bot@aesthetic-daily'
            git add data.json
            git diff --quiet --cached || git commit -m "auto: update daily theme [skip ci]"
            git push
          fi