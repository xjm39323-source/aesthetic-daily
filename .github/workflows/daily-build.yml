name: Daily Aesthetic Build
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Daily Scraper
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scraper/daily-build.js
      - name: Commit and push
        run: |
          git config --global user.name 'aesthetic-bot'
          git config --global user.email 'bot@aesthetic-daily.com'
          git add js/data.json images/ deploy-trigger.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: daily theme day $(date +%s)"
          git push
